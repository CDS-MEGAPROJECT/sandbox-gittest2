version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://forge:forge@db:5432/forge
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    read_only: true
    tmpfs:
      - /tmp

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
      - POSTGRES_DB=forge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forge']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
